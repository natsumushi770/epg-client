<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ストリーミングプレーヤー</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest/dist/mpegts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-container {
            background: #0f0f23;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 900px;
            width: 100%;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2a4a;
        }

        .live-badge {
            background: #e53935;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .channel-name {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            background: #3949ab;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: #5c6bc0;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 16px;
            padding: 12px;
            background: #1a1a3e;
            border-radius: 8px;
            color: #8888aa;
            font-size: 13px;
        }

        .status.error {
            background: #3e1a1a;
            color: #ff6b6b;
        }

        .status.success {
            background: #1a3e1a;
            color: #6bff6b;
        }

        .channel-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 8px;
            background: #1a1a3e;
        }

        .channel-item {
            padding: 12px 16px;
            border-bottom: 1px solid #2a2a4a;
            cursor: pointer;
            transition: background 0.2s;
        }

        .channel-item:hover {
            background: #2a2a5a;
        }

        .channel-item.active {
            background: #3949ab;
        }

        .channel-item:last-child {
            border-bottom: none;
        }

        .channel-item-name {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .channel-item-program {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .channel-item-desc {
            color: #666;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .channel-list-header {
            color: #888;
            font-size: 12px;
            padding: 10px 16px;
            background: #12122a;
            border-radius: 8px 8px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: transparent;
            color: #888;
            padding: 4px 8px;
            font-size: 12px;
        }

        .refresh-btn:hover {
            background: #2a2a4a;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="channel-info">
            <span class="live-badge">● LIVE</span>
            <span id="channel-name" class="channel-name">読み込み中...</span>
        </div>
        
        <div class="video-wrapper">
            <video id="video" controls autoplay></video>
        </div>
        
        <div class="controls">
            <button onclick="startStream()">▶ 再生</button>
            <button onclick="stopStream()">■ 停止</button>
            <button onclick="toggleMute()">🔊 ミュート切替</button>
            <button onclick="toggleFullscreen()">⛶ フルスクリーン</button>
        </div>
        
        <div id="status" class="status">準備完了</div>

        <div class="channel-list-header">
            <span>チャンネル一覧</span>
            <button class="refresh-btn" onclick="loadChannels()">更新</button>
        </div>
        <div id="channel-list" class="channel-list">
            <div class="channel-item">読み込み中...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const channelNameEl = document.getElementById('channel-name');
        const channelListEl = document.getElementById('channel-list');
        let player = null;
        let currentChannelId = null;
        let channels = [];

        function updateStatus(message, type = '') {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }

        function startStream(channelId) {
            if (player) {
                player.pause();
                player.unload();
                player.detachMediaElement();
                player.destroy();
                player = null;
            }

            currentChannelId = channelId;
            const streamUrl = window.location.origin + '/stream/' + channelId;

            if (mpegts.isSupported()) {
                player = mpegts.createPlayer({
                    type: 'mpegts',
                    isLive: true,
                    url: streamUrl
                }, {
                    enableWorker: true,
                    liveBufferLatencyChasing: true,
                    liveBufferLatencyMaxLatency: 1.5,
                    liveBufferLatencyMinRemain: 0.3
                });

                player.attachMediaElement(video);
                player.load();

                player.on(mpegts.Events.LOADING_COMPLETE, function() {
                    updateStatus('ストリーム読み込み完了', 'success');
                });

                player.on(mpegts.Events.METADATA_ARRIVED, function() {
                    updateStatus('ストリーム再生中', 'success');
                    video.play().catch(e => {
                        updateStatus('自動再生がブロックされました。再生ボタンをクリックしてください。', 'error');
                    });
                });

                player.on(mpegts.Events.ERROR, function(type, detail, info) {
                    console.log('MPEGTS Error:', type, detail, info);
                    updateStatus('エラーが発生しました: ' + detail, 'error');
                });

                updateStatus('ストリームに接続中...', '');

                video.play().catch(e => {
                    console.log('自動再生待機中...');
                });

            } else {
                updateStatus('このブラウザはMPEG-TS再生に対応していません', 'error');
            }

            updateChannelList();
        }

        function stopStream() {
            if (player) {
                player.pause();
                player.unload();
                player.detachMediaElement();
                player.destroy();
                player = null;
            }
            video.pause();
            updateStatus('停止しました', '');
        }

        function toggleMute() {
            video.muted = !video.muted;
            updateStatus(video.muted ? 'ミュートしました' : 'ミュート解除しました', '');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                video.requestFullscreen().catch(err => {
                    updateStatus('フルスクリーンに切り替えられませんでした', 'error');
                });
            } else {
                document.exitFullscreen();
            }
        }

        function switchChannel(channelId, channelName) {
            channelNameEl.textContent = channelName;
            document.title = 'ストリーミングプレーヤー - ' + channelName;
            startStream(channelId);
        }

        function updateChannelList() {
            channelListEl.innerHTML = channels.map(item => {
                const ch = item.channel;
                const prog = item.programs && item.programs[0];
                const isActive = currentChannelId === ch.id;
                const progName = prog ? prog.name : '番組情報なし';
                const progDesc = prog && prog.description ? prog.description : '';

                return `
                    <div class="channel-item ${isActive ? 'active' : ''}" onclick="switchChannel(${ch.id}, '${ch.name.replace(/'/g, "\\'")}')">
                        <div class="channel-item-name">${ch.name}</div>
                        <div class="channel-item-program">${progName}</div>
                        ${progDesc ? `<div class="channel-item-desc">${progDesc}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        async function loadChannels() {
            try {
                channelListEl.innerHTML = '<div class="channel-item">読み込み中...</div>';
                const res = await fetch('/api/schedules');
                channels = await res.json();

                if (channels.length > 0) {
                    if (!currentChannelId) {
                        const firstChannel = channels[0].channel;
                        channelNameEl.textContent = firstChannel.name;
                        document.title = 'ストリーミングプレーヤー - ' + firstChannel.name;
                        startStream(firstChannel.id);
                    } else {
                        updateChannelList();
                    }
                }
            } catch (err) {
                console.error('チャンネル読み込みエラー:', err);
                channelListEl.innerHTML = '<div class="channel-item">チャンネル一覧の読み込みに失敗しました</div>';
            }
        }

        window.addEventListener('load', function() {
            loadChannels();
        });
    </script>
</body>
</html>
